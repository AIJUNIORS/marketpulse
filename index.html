function hc(v){
  if(v===0)return{bg:'#f9fafb',tc:'#9ca3af'};
  const i=Math.min(Math.abs(v)/12,1);
  return v>0?{bg:`rgba(22,163,74,${.07+i*.42})`,tc:i>0.6?'#14532d':'#166534'}
            :{bg:`rgba(220,38,38,${.07+i*.42})`,tc:i>0.6?'#7f1d1d':'#991b1b'};
}

function renderPulse(){
  document.getElementById('atabs').innerHTML='';
  document.getElementById('stabs').innerHTML='';
  if(!window.grpPeriod) window.grpPeriod={0:'ytd',1:'ytd',2:'ytd',3:'ytd'};
  function gv(item,p){
    if(p==='ytd')return item.kpi?parseFloat(item.kpi.ytd):item.ytd||0;
    if(p==='mtd')return item.kpi?parseFloat(item.kpi.mtd)||parseFloat(item.kpi.r1m):item.r1m||0;
    if(p==='r1y')return item.kpi?parseFloat(item.kpi.r1y):item.r1y||0;
    return 0;
  }
  function avg(arr){return arr.length?parseFloat((arr.reduce((s,v)=>s+v,0)/arr.length).toFixed(1)):0;}
  function buildGroup(g,gi){
    const p=window.grpPeriod[gi]||'ytd';
    const periods=['mtd','ytd','r1y'];
    const labels={mtd:'MTD',ytd:'YTD',r1y:'1Y'};
    const vals=periods.map(pp=>avg(g.items.map(it=>gv(it,pp))));
    const pos=g.items.filter(it=>gv(it,p)>0).length;
    const best=g.items.reduce((b,it)=>gv(it,p)>gv(b,p)?it:b,g.items[0]);
    const worst=g.items.reduce((w,it)=>gv(it,p)<gv(w,p)?it:w,g.items[0]);
    const mxA=Math.max(...g.items.map(it=>Math.abs(gv(it,p))),0.1);
    const summary=`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0 7px;border-bottom:1px solid #f3f4f6;margin-bottom:7px;flex-wrap:wrap;gap:4px">
      <div style="display:flex;gap:5px;align-items:center">
        ${periods.map((pp,i)=>`<div onclick="setGrpPeriod(${gi},'${pp}')" style="text-align:center;padding:3px 7px;border-radius:4px;cursor:pointer;background:${pp===p?'#111827':'#f9fafb'};border:1px solid ${pp===p?'#374151':'#e5e7eb'}">
          <div style="font-size:8px;color:${pp===p?'#60a5fa':'#9ca3af'};font-weight:700;text-transform:uppercase;letter-spacing:.4px">${labels[pp]}</div>
          <div style="font-size:11px;font-weight:800;font-family:'Courier New',monospace;color:${vals[i]>=0?(pp===p?'#4ade80':'#16a34a'):(pp===p?'#f87171':'#dc2626')}">${vals[i]>=0?'+':''}${vals[i]}%</div>
        </div>`).join('')}
      </div>
      <div style="font-size:9px;color:#9ca3af">
        <span style="color:#6b7280;font-weight:600">${pos}/${g.items.length} +ve</span>
        <span style="margin:0 3px;color:#e5e7eb">|</span>
        <span style="color:#16a34a">↑${best.label||best.name} ${gv(best,p)>=0?'+':''}${gv(best,p).toFixed(1)}%</span>
        <span style="margin:0 3px;color:#e5e7eb">·</span>
        <span style="color:#dc2626">↓${worst.label||worst.name} ${gv(worst,p).toFixed(1)}%</span>
      </div>
    </div>`;
    const tiles=g.items.map(item=>{
      const v=gv(item,p);const{bg,tc}=hc(v);const rc=item.rc||item.type||'m';
      const rcB={c:'bc',d:'bd',h:'bh',cy:'bcy',v:'bv',m:'bm'}[rc]||'bm';
      return`<div class="tile" style="background:${bg};border-color:${v>0?'rgba(22,163,74,.2)':'rgba(220,38,38,.2)'}"
        onclick="openTile('${(item.label||item.name).replace(/'/g,"\'")}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div class="tile-nm" style="color:${tc}">${item.label||item.name}</div>
          <div class="tile-tk">${item.tk||''}</div></div>
          <span class="badge ${rcB}" style="font-size:8px">${rc.toUpperCase().slice(0,3)}</span>
        </div>
        <div class="tile-ret" style="color:${tc}">${v>=0?'+':''}${v.toFixed(1)}%</div>
        <div class="tile-dd" style="color:${tc}">DD ${item.kpi?item.kpi.curdd||item.kpi.maxdd:item.maxdd||0}%</div>
      </div>`;
    }).join('');
    return`<div class="pulse-group" id="pg${gi}">
      <div style="font-size:9px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px">${g.lbl}</div>
      ${summary}
      <div class="tile-grid" style="grid-template-columns:${g.cols}">${tiles}</div>
    </div>`;
  }
  const groups=[
    {lbl:'Global Markets',items:Object.values(MKTS),cols:'repeat(4,1fr)'},
    {lbl:'US Sectors & Macro',items:SECTS.US.sectors,cols:'repeat(4,1fr)'},
    {lbl:'India Sectors & Macro',items:SECTS.INDIA.sectors,cols:'repeat(4,1fr)'},
    {lbl:'TSX Sectors & Macro',items:SECTS.TSX.sectors,cols:'repeat(4,1fr)'}
  ];
  document.getElementById('cnt').innerHTML=`<div style="padding:10px 0">
    <div style="font-size:10px;font-weight:700;color:#374151;margin-bottom:8px">
      ${groups.reduce((s,g)=>s+g.items.length,0)} instruments · each group has independent MTD / YTD / 1Y switcher
    </div>
    <div class="pulse-groups">${groups.map((g,gi)=>buildGroup(g,gi)).join('')}</div>
  </div>`;
}
function setGrpPeriod(gi,p){
  if(!window.grpPeriod) window.grpPeriod={0:'ytd',1:'ytd',2:'ytd',3:'ytd'};
  window.grpPeriod[gi]=p;

}

function buildHM(monthly,years){
  let h=`<table class="hm"><thead><tr><th class="yl">Year</th>${MO.map(m=>`<th>${m}</th>`).join('')}<th style="background:#f3f4f6">Total</th></tr></thead><tbody>`;
  years.forEach(yr=>{
    const row=monthly[yr];if(!row)return;
    const tot=row.slice(0,yr===2026?4:12).reduce((s,v)=>s+v,0);
    h+=`<tr><td class="yl">${yr}</td>`;
    row.forEach((v,mi)=>{
      if(yr===2026&&mi>3){h+=`<td style="color:#d1d5db;font-size:8px">·</td>`;return;}
      const{bg,tc}=hc(v);
      h+=`<td style="background:${bg};color:${tc}">${v>=0?'+':''}${v.toFixed(1)}</td>`;
    });
    h+=`<td style="color:${tot>=0?'#14532d':'#7f1d1d'};font-weight:800;background:${tot>=0?'#dcfce7':'#fee2e2'};border-radius:3px">${tot>=0?'+':''}${tot.toFixed(1)}</td></tr>`;
  });
  return h+`</tbody></table>`;
}

function nowBanner(D){
  const ytd=parseFloat(D.kpi.ytd),mtd=parseFloat(D.kpi.mtd);
  const seasMo=D.seas.avg[TODAY_MO],seasWk=D.seas.wkAvg[TODAY_MO];
  const seasMo5=(D.seas.avg5||D.seas.avg)[TODAY_MO],seasWk5=(D.seas.wkAvg5||D.seas.wkAvg)[TODAY_MO];
  const allVals=Object.values(D.annual);
  const rank=Math.round(allVals.filter(v=>v<ytd).length/allVals.length*100);
  const moVals=Object.keys(D.monthly).filter(y=>parseInt(y)<2026).map(y=>D.monthly[y][TODAY_MO]).filter(v=>Math.abs(v)>0);
  const moRank=Math.round(moVals.filter(v=>v<mtd).length/moVals.length*100);
  const moPos=Math.max(0,Math.min(100,(ytd-Math.min(...allVals))/(Math.max(...allVals)-Math.min(...allVals))*100));
  const moAbove=mtd>seasMo5;const wkAbove=seasWk5>=0;
  const seasNext=D.seas.avg[(TODAY_MO+1)%12];
  const seasNext5=(D.seas.avg5||D.seas.avg)[(TODAY_MO+1)%12];
  const verdictParts=[];
  if(rank>65)verdictParts.push(`<b>${D.label}</b> YTD ${D.kpi.ytd}% — top-tercile year, <b>${rank}th percentile</b> historically at this calendar point`);
  else if(rank<35)verdictParts.push(`<b>${D.label}</b> YTD ${D.kpi.ytd}% — below-average year, <b>${rank}th percentile</b> historically`);
  else verdictParts.push(`<b>${D.label}</b> YTD ${D.kpi.ytd}% — tracking near historical average`);
  if(moAbove)verdictParts.push(`April running <b>above seasonal norm</b> (MTD ${D.kpi.mtd}% vs 5yr ${pct(seasMo5)} · 20yr ${pct(seasMo)}, +ve ${D.seas.posRate[TODAY_MO]}% of Aprils)`);
  else verdictParts.push(`April running <b>below seasonal norm</b> (MTD ${D.kpi.mtd}% vs 5yr ${pct(seasMo5)} · 20yr ${pct(seasMo)})`);
  if(seasNext5<-0.5)verdictParts.push(`seasonal <b>headwind</b> in May (5yr ${pct(seasNext5)} · 20yr ${pct(seasNext)})`);
  else if(seasNext5>0.5)verdictParts.push(`seasonal <b>tailwind</b> in May (5yr ${pct(seasNext5)} · 20yr ${pct(seasNext)})`);
  const curDD=parseFloat(D.kpi.curdd);
  if(curDD<-10)verdictParts.push(`<b>${Math.abs(curDD).toFixed(1)}% below peak</b>`);
  else if(curDD>=0)verdictParts.push(`<b>at or near all-time high</b>`);
  return`<div class="verdict-card"><div class="verdict-label">Intelligence · ${D.label} · Apr 28 2026</div>

}

  const qAvg=[0,1,2,3].map(q=>parseFloat((avg.slice(q*3,q*3+3).reduce((a,v)=>a+v,0)/3).toFixed(2)));

  const moWorst=Math.min(...moVals),moBest=Math.max(...moVals);
  const moPos=Math.max(0,Math.min(100,(mtd-moWorst)/(moBest-moWorst)*100));
  let sg=`<div class="seas-grid">`;

function renderCross(el){

    // Annual table
    const yrs=Object.keys(MKTS.SP.annual).map(Number).sort();
    let h=`<div class="pnl"><div class="ptl">Annual returns — all markets · bold green = best that year</div>

      <thead><tr><th class="al">Market</th>${yrs.map(y=>`<th>${y}</th>`).join('')}</tr></thead><tbody>`;
    ks.forEach(k=>{

      h+=`<tr><td class="al" style="color:${D.color}">${D.label}</td>`;

        const v=D.annual[y];
        if(v===undefined){h+=`<td style="color:#d1d5db;font-size:9px">·</td>`;return;}
        const isBest=v===Math.max(...ks.map(k2=>MKTS[k2].annual[y]||0));

      });
      h+=`</tr>`;
    });
    body+=h+`</tbody></table></div></div>`;

    </div>`;
    // Rolling returns table

      <div style="overflow-x:auto;margin-top:6px"><table class="rel-tbl">

    ks.forEach(k=>{
      const D=MKTS[k];
      const cols=[D.kpi.mtd,D.kpi.r1m,D.kpi.r3m,D.kpi.r6m,D.kpi.r1y,D.kpi.curdd];
      h+=`<tr><td class="al" style="color:${D.color}">${D.label}</td>`;
      cols.forEach(v=>{
        const n=parseFloat(v);
        h+=`<td style="color:${n>=0?'#15803d':'#991b1b'};font-weight:${Math.abs(n)>10?800:600};font-family:'Courier New',monospace">${n>=0?'+':''}${n.toFixed(1)}%</td>`;
      });
      h+=`</tr>`;

    const ddP=[...ks].map(k=>({k,v:parseFloat(MKTS[k].kpi.curdd)})).sort((a,b)=>a.v-b.v);

    ddP.forEach(({k,v})=>{
      dd+=mkBar(MKTS[k].label,v,mxA,Math.abs(v)>15?'#dc2626':Math.abs(v)>5?'#d97706':'#16a34a','From peak');
    });
    body+=dd+`</div></div>`;
  } else {
    // Weekly seasonal — avg weekly return by month, current week highlighted
    const sorted=[...ks].sort((a,b)=>MKTS[b].seas.wkAvg[TODAY_MO]-MKTS[a].seas.wkAvg[TODAY_MO]);
    const vals=sorted.map(k=>MKTS[k].seas.wkAvg[TODAY_MO]);
    const maxA=Math.max(...vals.map(Math.abs),0.1);
    body=`<div class="pnl" style="margin-bottom:10px">
      <div class="ptl">Week ${TODAY_WK} historical avg return — all markets · sorted strongest to weakest</div>
      <div style="margin-top:8px">${sorted.map(k=>mkBar(MKTS[k].label,MKTS[k].seas.wkAvg[TODAY_MO],maxA,MKTS[k].color,`${MKTS[k].seas.wkPos[TODAY_MO]}% +ve`)).join('')}</div>
    </div>`;
    // Monthly seasonality grid
    const MO2=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    let h=`<div class="pnl"><div class="ptl">Monthly seasonality — avg weekly return by month · all markets · * = current month</div>
      <div style="overflow-x:auto;margin-top:6px"><table class="rel-tbl">
      <thead><tr><th class="al">Market</th>${MO2.map((m,i)=>`<th style="${i===TODAY_MO?'color:#1d4ed8;font-weight:800':''}">${m}${i===TODAY_MO?'*':''}</th>`).join('')}</tr></thead><tbody>`;
    ks.forEach(k=>{
      const D=MKTS[k];
      h+=`<tr><td class="al" style="color:${D.color}">${D.label}</td>`;
      D.seas.wkAvg.forEach((v,mi)=>{
        const isCur=mi===TODAY_MO;
        h+=`<td style="color:${v>=0?'#15803d':'#991b1b'};${isCur?'background:#eff6ff;font-weight:800':''}font-family:'Courier New',monospace">${v>=0?'+':''}${v.toFixed(2)}</td>`;
      });
      h+=`</tr>`;
    });
    body+=h+`</tbody></table></div></div>`;
  }
  el.innerHTML=tabBar+body;
}

function renderRotation(SD,el){
  const secs=SD.sectors.filter(s=>s.type!=='m'&&s.type!=='b');
  const bYtd=SD.bm.ytd;
  const cyc=secs.filter(s=>s.type==='c'||s.type==='h'),def=secs.filter(s=>s.type==='d');
  const cycAvg=parseFloat((cyc.reduce((a,s)=>a+s.ytd,0)/Math.max(cyc.length,1)).toFixed(1));
  const defAvg=parseFloat((def.reduce((a,s)=>a+s.ytd,0)/Math.max(def.length,1)).toFixed(1));
  const aboveBm=secs.filter(s=>s.ytd>bYtd).length;
  const sorted=[...secs].sort((a,b)=>b.ytd-a.ytd);
  const maxAbs=Math.max(...secs.map(s=>Math.abs(s.ytd-bYtd)),1);
  const cycleMap={
    US:[
      {phase:'Early Cycle',secs:'Financials · Disc · Industrials',key:'early'},
      {phase:'',secs:'Tech · Semis · Materials',key:'mid'},
      {phase:'Late Cycle',secs:'Energy · Healthcare · Staples',key:'late'},
      {phase:'Recession',secs:'Utilities · Staples · Healthcare',key:'rec'}
    ],
    INDIA:[
      {phase:'Early Cycle',secs:'PSU Bank · Infra · Auto',key:'early'},
      {phase:'',secs:'Metal · IT · Pvt Bank',key:'mid'},
      {phase:'Late Cycle',secs:'Energy · Oil & Gas · FMCG',key:'late'},
      {phase:'Recession',secs:'Pharma · Health · FMCG',key:'rec'}
    ],
    TSX:[
      {phase:'Early Cycle',secs:'Financials · Industrials · Disc',key:'early'},
      {phase:'',secs:'Materials · Technology · Energy',key:'mid'},
      {phase:'Late Cycle',secs:'Energy · Gold · Healthcare',key:'late'},
      {phase:'Recession',secs:'Utilities · Staples · Telecom',key:'rec'}
    ]
  };
  const cycles=cycleMap[curSctry]||cycleMap.US;
  const ap=computedPhase.toLowerCase();
  // Compute phase from data — no hardcoded opinions
  const breadthPct=Math.round(aboveBm/secs.length*100);
  const cycLead=cycAvg>defAvg;
  const bothPos=cycAvg>0&&defAvg>0;
  const bothNeg=cycAvg<0&&defAvg<0;
  const computedPhase=bothNeg?'Recession':
    (!cycLead&&defAvg>0&&defAvg>cycAvg+1)?'Late Cycle':
    (cycLead&&bothPos&&breadthPct>55)?'Mid Cycle':'Early/Mixed';

  // Best and worst sector from data
  const bestSec=secs.reduce((a,b)=>b.ytd>a.ytd?b:a);
  const worstSec=secs.reduce((a,b)=>b.ytd<a.ytd?b:a);
  const leadType=cycLead?'Cyclicals leading':'Defensives leading';
  const breadthSignal=breadthPct>60?'broad participation':'narrow breadth';

  const computedNote=`${leadType} — cyclicals avg <b>${pct(cycAvg)}</b> vs defensives <b>${pct(defAvg)}</b>. `+
    `<b>${aboveBm}/${secs.length}</b> sectors above ${SD.bm.label} benchmark (${breadthSignal}). `+
    `Top: <b>${bestSec.name} ${pct(bestSec.ytd)}</b> · Laggard: <b>${worstSec.name} ${pct(worstSec.ytd)}</b>.`;

  el.innerHTML=`
  <div class="verdict-card" style="margin-bottom:10px">
    <div class="verdict-label">Rotation intelligence — ${SD.label} · computed phase: ${computedPhase}</div>
    <div class="verdict-text">${computedNote}</div>
  </div>
  <div class="g2" style="margin-bottom:10px">
    <div class="pnl">
      <div class="ptl">Cycle clock — current phase</div>
      <div style="display:flex;gap:6px;margin-bottom:8px">
        <div style="flex:1;background:#f9fafb;border-radius:6px;padding:7px;text-align:center">
          <div style="font-size:9px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:2px">Cyclicals avg</div>
          <div style="font-size:20px;font-weight:800;font-family:'Courier New',monospace;color:${cycAvg>=0?'#16a34a':'#dc2626'}">${pct(cycAvg)}</div>
        </div>
        <div style="flex:1;background:#f9fafb;border-radius:6px;padding:7px;text-align:center">
          <div style="font-size:9px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:2px">Defensives avg</div>
          <div style="font-size:20px;font-weight:800;font-family:'Courier New',monospace;color:${defAvg>=0?'#16a34a':'#dc2626'}">${pct(defAvg)}</div>
        </div>
      </div>
      <div style="font-size:9px;color:#9ca3af;font-weight:700;text-transform:uppercase;margin-bottom:3px">Breadth vs ${SD.bm.label}</div>
      <div class="breadth-bar"><div class="breadth-fill" style="width:${aboveBm/secs.length*100}%"></div></div>
      <div style="font-size:10px;color:#374151;margin-bottom:8px"><b>${aboveBm} of ${secs.length}</b> sectors above benchmark</div>
      <div class="cycle-grid">
        ${cycles.map(c=>{
          const isActive=ap.includes(c.key)||SD.phase===c.phase;
          return`<div class="phase-card ${isActive?'active':''}">
            <div class="phase-nm ${isActive?'on':''}">${c.phase}${isActive?' ←':''}</div>
            <div class="phase-ss ${isActive?'on':''}">${c.secs}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div class="pnl">
      <div class="ptl">Relative strength vs ${SD.bm.label} YTD</div>

          </div>
          <div style="width:40px;text-align:right;font-size:10px;font-weight:800;color:${rel>=0?'#15803d':'#991b1b'};font-family:'Courier New',monospace">${rel>=0?'+':''}${rel}%</div>

    <div style="overflow-x:auto"><table class="rel-tbl">
      <thead><tr><th class="al">Sector</th><th>Type</th><th>MTD</th><th>YTD</th><th>vs Bmk</th><th>1M</th><th>3M</th><th>1Y</th><th>Signal</th></tr></thead>

        if(m1>m3q&&m1>0&&s.r3m>0){sig='Accel ↑';sc='#16a34a';}
        else if(m1>0&&m1<=m3q){sig='Slowing ↓';sc='#d97706';}
        else if(m1<0&&s.r3m<0){sig='Weak ↓↓';sc='#dc2626';}
        return`<tr>
          <td class="al">${s.name}</td>
          <td><span class="badge ${s.type==='c'?'bc':s.type==='d'?'bd':'bm'}" style="font-size:8px">${s.type==='c'?'C':s.type==='d'?'D':'M'}</span></td>
          <td style="color:${s.r1m>=0?'#15803d':'#991b1b'}">${pct(s.r1m)}</td>
          <td style="color:${s.ytd>=0?'#15803d':'#991b1b'};font-weight:800">${pct(s.ytd)}</td>
          <td style="color:${rel>=0?'#15803d':'#991b1b'};background:${rel>=0?'#f0fdf4':'#fef2f2'};font-weight:800">${rel>=0?'+':''}${rel}%</td>
          <td style="color:${s.r1m>=0?'#15803d':'#991b1b'}">${pct(s.r1m)}</td>
          <td style="color:${s.r3m>=0?'#15803d':'#991b1b'}">${pct(s.r3m)}</td>
          <td style="color:${s.r1y>=0?'#15803d':'#991b1b'}">${pct(s.r1y)}</td>
          <td style="color:${sc};font-weight:700;font-family:sans-serif">${sig}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>
  </div>`;
}

function renderSectAnnHM(SD,el){
  const secs=SD.sectors;

  let h=`<div class="pnl"><div class="ptl">Annual returns — all sectors × all years</div><div style="overflow-x:auto;margin-top:8px">
    <table class="hm"><thead><tr><th class="yl" style="min-width:120px">Sector</th>${allYrs.map(y=>`<th>${y}</th>`).join('')}<th>Avg</th></tr></thead><tbody>`;
  secs.forEach(s=>{
    const vals=allYrs.map(y=>s.annual[y]!==undefined?s.annual[y]:null);
    const valid=vals.filter(v=>v!==null);
    const avg=valid.length?(valid.reduce((a,v)=>a+v,0)/valid.length).toFixed(1):'-';
    h+=`<tr><td class="yl">${s.name} <span class="badge ${s.type==='c'?'bc':'bd'}" style="font-size:8px">${s.type==='c'?'C':'D'}</span></td>`;
    vals.forEach(v=>{
      if(v===null){h+=`<td style="color:#d1d5db;font-size:9px">·</td>`;return;}
      const{bg,tc}=hc(v);h+=`<td style="background:${bg};color:${tc}">${v>=0?'+':''}${v.toFixed(1)}</td>`;
    });
    const ac=hc(parseFloat(avg));
    h+=`<td style="background:${ac.bg};color:${ac.tc};font-weight:800">${parseFloat(avg)>=0?'+':''}${avg}</td></tr>`;
  });
  el.innerHTML=h+`</tbody></table></div></div>`;
}

// ── Live data loader ─────────────────────────────────────────────────────────
// Fetches data/*.json from GitHub Pages, merges into MKTS/SECTS, re-renders.
// Embedded data shows immediately as fallback — live data overlays when ready.
async function loadLiveData(){
  const base=window.location.pathname.replace(/\/[^\/]*$/,'')+'/data/';
  // 1. Check metadata for last update time
  try{
    const meta=await fetch(base+'metadata.json',{cache:'no-store'}).then(r=>r.ok?r.json():null);
    if(meta&&meta.generated_at){
      const d=new Date(meta.generated_at);
      const fmt=d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})
               +' · '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})+' UTC';
      document.getElementById('updTs').textContent=fmt+' · live';
    }
  }catch(e){}

  // 2. Build full fetch list: MKTS (7) + all SECTS sectors
  const jobs=[];
  // Markets
  Object.entries(MKTS_TK).forEach(([file,key])=>{
    jobs.push({file,type:'mkt',key});
  });
  // Sectors — all three regions
  ['US','INDIA','TSX'].forEach(ctry=>{
    SECTS[ctry].sectors.forEach((s,idx)=>{
      const file='returns_'+safeTk(s.tk);
      jobs.push({file,type:'sect',ctry,idx});
    });
  });

  // 3. Fetch in batches of 8 — don't hammer GitHub CDN
  const BATCH=8;
  let updated=0,failed=0;
  for(let i=0;i<jobs.length;i+=BATCH){
    const batch=jobs.slice(i,i+BATCH);
    await Promise.allSettled(batch.map(async job=>{
      try{
        const url=base+job.file+'.json';
        const r=await fetch(url,{cache:'no-store'});
        if(!r.ok)throw new Error(r.status);
        const d=await r.json();
        if(job.type==='mkt'){
          // Merge live fields into existing MKTS object (preserve color/regime/seas/drawdown)
          const M=MKTS[job.key];
          if(d.kpi)    M.kpi=d.kpi;
          if(d.annual) M.annual=d.annual;
          if(d.monthly)M.monthly=d.monthly;
          if(d.seas)   M.seas=d.seas;
        } else {
          // Merge into SECTS sector
          const s=SECTS[job.ctry].sectors[job.idx];
          if(d.kpi){
            s.ytd=parseFloat(d.kpi.ytd)||s.ytd;
            s.r1m=parseFloat(d.kpi.r1m)||s.r1m;
            s.r3m=parseFloat(d.kpi.r3m)||s.r3m;
            s.r1y=parseFloat(d.kpi.r1y)||s.r1y;
          }
          if(d.annual) s.annual=d.annual;
          if(d.monthly)s.monthly=d.monthly;
          if(d.seas)   s.seas=d.seas;
        }
        updated++;
      }catch(e){failed++;}
    }));
  }

  // 4. Re-render with live data
  if(updated>0){
    killCharts();
    buildMktStrip();
    renderAll();
    console.log('MarketPulse: live data loaded ('+updated+' ok, '+failed+' failed)');
  } else {
    document.getElementById('updTs').textContent='Embedded data (live fetch failed)';
  }
}

// Fire live load after page renders — don't block initial display
setTimeout(loadLiveData, 200);
</script>
